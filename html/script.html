<textarea readonly onclick="this.select()" style="width:100%; height:100%; font-size: 20px">
    //PASTE INTO CONSOLE ON THE OLD SITE PAGE
    //DO IT FOR BOTH GAME AND MAIN SITE
    //IF YOU WANT ONLY GAMES NOT MAIN SITE SETTING IMPORTED ONLY DO GAMES
    alert("YOU NEED TO EXPORT ON A GAME AND ON MAIN SITE FOR IT TO COPY PROPERLY \n ONCE YOU EXPORT FOR ONE GAME IT WILL EXPORT FOR ALL GAMES \n MEANING ONE EXPORT FOR MAIN SETTINGS ON MAIN PAGE AND ONE EXPORT FOR GAMES ON AN GAME \n AND DO NOT MIX THE FILES GAMES HAVE -GAMES PREFIX FOR THAT");
    const cookies = document.cookie.split('; ').reduce((acc, cookie) => {
        const [name, value] = cookie.split('=');
        acc[name] = value;
        return acc;
    }, {});

    const localStorageData = {};
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        localStorageData[key] = localStorage.getItem(key);
    }

    const data = {
        cookies: cookies,
        localStorage: localStorageData
    };
    const jsonData = JSON.stringify(data);
    const blob = new Blob([jsonData], { type: 'application/json' });

    const link = document.createElement('a');
    const currentDate = new Date().toISOString().slice(0, 10);
    link.href = URL.createObjectURL(blob);
    link.download = `bendover-main${currentDate}.save`;

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
</textarea>
